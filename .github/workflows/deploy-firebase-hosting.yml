name: Firebase Hosting (Manual Saat Domain Resmi Siap)

on:
  workflow_dispatch:
    inputs:
      deploy_live:
        description: "Deploy ke Firebase live (aktifkan hanya setelah domain resmi dan secret siap)"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  checks: write

concurrency:
  group: "sikanda-production"
  cancel-in-progress: true

jobs:
  verify-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependensi terkunci
        run: npm ci

      - name: Verifikasi produksi
        run: npm run verify
        env:
          VITE_APPS_SCRIPT_URL: ${{ secrets.VITE_APPS_SCRIPT_URL }}

      - name: Audit dependensi produksi
        run: npm audit --omit=dev --audit-level=high

      - name: Deploy live
        if: ${{ inputs.deploy_live == true }}
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIKANDA }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_HOSTING_PROJECT_ID }}

      - name: Informasi penundaan deploy
        if: ${{ inputs.deploy_live != true }}
        run: echo "Verifikasi selesai. Deploy Firebase tidak dijalankan karena domain resmi belum siap."
